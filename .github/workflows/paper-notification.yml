name: "Paper Add Label"

on:
  issues:
    types: [opened]

jobs:
  label:
    if: contains(github.event.issue.labels.*.name, 'add-paper')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: "확인 완료 라벨 추가"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label "add-paper" 2>/dev/null || true
          echo "Issue #${{ github.event.issue.number }} processed."
